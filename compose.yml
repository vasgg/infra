services:
  postgres:
    image: postgres:18.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    shm_size: 256m
    mem_limit: 2G
    cpus: 2
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=1536MB"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "min_wal_size=256MB"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "autovacuum_max_workers=3"
      - "-c"
      - "autovacuum_naptime=30s"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - infra
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --save 900 1
      --save 300 10
      --tcp-backlog 511
      --timeout 300
      --tcp-keepalive 60
      --hz 10
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    mem_limit: 768M
    cpus: 1
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - infra

networks:
  infra:
    name: infra
    driver: bridge

volumes:
  pg_data:
    name: infra_pg_data
  redis_data:
    name: infra_redis_data